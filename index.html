<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Japão Golden Route</title>
  <meta name="description" content="Roteiro interativo — Japão Golden Route 24/07 a 08/08/2026">
  <meta name="theme-color" content="#14141f">
  <!-- PWA / iOS -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Japão 2026">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" href="icons/favicon.png">
  <!-- Leaflet (mapa) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="topbar-inner">
        <span class="topbar-title" id="topbar-title">🎌 Japão Golden Route</span>
        <button id="btn-search" class="icon-btn" aria-label="Buscar">🔍</button>
      </div>
      <div id="searchbar" class="hidden">
        <input type="search" id="search-input" placeholder="Buscar local, restaurante, loja…" autocomplete="off">
        <button id="search-close" class="icon-btn">✕</button>
      </div>
      <div id="search-results" class="hidden"></div>
    </header>

    <main id="views">
      <section id="view-inicio" class="view"></section>
      <section id="view-roteiro" class="view hidden"></section>
      <section id="view-mapa" class="view hidden"><div id="map"></div>
        <div id="map-filters"></div>
        <button id="map-locate" title="Minha localização">📍</button>
      </section>
      <section id="view-perto" class="view hidden"></section>
      <section id="view-favoritos" class="view hidden"></section>
      <section id="view-cidades" class="view hidden"></section>
      <section id="view-config" class="view hidden"></section>
    </main>

    <div id="sheet-backdrop" class="hidden"></div>
    <div id="sheet" class="hidden"></div>

    <nav id="tabbar">
      <button data-tab="inicio" class="tab active"><span>🏠</span><label>Início</label></button>
      <button data-tab="roteiro" class="tab"><span>📅</span><label>Roteiro</label></button>
      <button data-tab="mapa" class="tab"><span>🗺️</span><label>Mapa</label></button>
      <button data-tab="perto" class="tab"><span>📍</span><label>Perto</label></button>
      <button data-tab="favoritos" class="tab"><span>⭐</span><label>Favoritos</label></button>
      <button data-tab="cidades" class="tab"><span>🏙️</span><label>Cidades</label></button>
      <button data-tab="config" class="tab"><span>⚙️</span><label>Mais</label></button>
    </nav>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
